name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify files
        run: |
          ls -la
          echo "Dashboard ready for GitHub Pages"

      - name: Test HTML validity
        run: |
          if [ -f index.html ]; then
            echo "✓ index.html found"
          else
            echo "✗ index.html missing!"
            exit 1
          fi
